# render.yaml — NexusOps deployment configuration for Render.com
# https://render.com/docs/render-yaml-ref
#
# Single combined web service: Express serves both the tRPC API and the
# Vite-built React SPA (via serveStatic). No separate static site needed.

services:
  - type: web
    name: nexusops-server
    runtime: node
    region: oregon
    plan: starter

    rootDir: .
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js

    # Render pings this path to determine instance readiness.
    # The endpoint always returns 200 so the server is marked healthy
    # even when optional services (Supabase, Airtable, etc.) are unconfigured.
    healthCheckPath: /api/health

    autoDeploy: true
    branch: main

    envVars:
      - key: NODE_ENV
        value: production

      # Supabase
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false

      # Database (direct Postgres URL for Drizzle / raw queries)
      - key: DATABASE_URL
        sync: false

      # Airtable
      - key: AIRTABLE_TOKEN
        sync: false
      - key: AIRTABLE_BASE_ID
        sync: false

      # Webhooks
      - key: MAKE_WEBHOOK_SECRET
        sync: false
      - key: N8N_WEBHOOK_SECRET
        sync: false

      # Stripe
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

      # LLM / Forge gateway
      - key: BUILT_IN_FORGE_API_KEY
        sync: false
      - key: BUILT_IN_FORGE_API_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false

      # Session / JWT
      - key: SESSION_SECRET
        generateValue: true

      # CORS — set to your custom domain if you use one
      - key: CLIENT_ORIGIN
        sync: false

      # Vite public env vars — passed at build time via Render's environment
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
